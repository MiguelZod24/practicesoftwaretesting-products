[pytest]
markers =
    smoke:     Tests de humo – flujo principal (subset mínimo que debe pasar siempre)
    busqueda:  Feature de búsqueda de productos
    filtros:   Feature de filtros por categoría
    detalle:   Feature de detalle de producto
    carrito:   Feature de gestión del carrito
    negativo:  Escenarios negativos / borde (resultado esperado = fallo o vacío)
    ui:        Capa de interfaz de usuario (Playwright)
    api:       Capa de API (Requests)

# Opciones por defecto para todos los runs
addopts =
    -v
    --tb=short
    --html=reports/reporte_tests.html
    --self-contained-html

# Donde están los tests
testpaths = tests
