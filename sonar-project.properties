# ─────────────────────────────────────────────────────────────────────────────
# SonarCloud – Configuración del proyecto
# Reemplaza sonar.projectKey y sonar.organization con tus valores reales.
# Los encontrarás en: https://sonarcloud.io/project/information
# ─────────────────────────────────────────────────────────────────────────────

sonar.projectKey=MiguelZod24_practicesoftwaretesting-products
sonar.organization=miguelzod24

sonar.projectName=practicesoftwaretesting-products
sonar.projectVersion=1.0

# ── Fuentes ──────────────────────────────────────────────────────────────────
sonar.sources=.
sonar.tests=tests
sonar.inclusions=**/*.py

sonar.exclusions=\
  **/__pycache__/**,\
  **/.venv/**,\
  **/.pytest_cache/**,\
  **/reports/**,\
  **/allure-results/**,\
  **/allure-report/**,\
  **/allure-history/**,\
  **/.github/**,\
  tests/**

# ── Python ───────────────────────────────────────────────────────────────────
sonar.python.version=3.11
sonar.python.coverage.reportPaths=reports/coverage.xml

# ── Encoding ─────────────────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8
